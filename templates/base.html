<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      color: #333;
    }

    nav {
      background: #2c3e50;
      padding: 14px 30px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    nav .brand {
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      margin-right: auto;
    }
    nav a {
      color: #ccc;
      text-decoration: none;
      font-size: 14px;
      padding: 6px 12px;
      border-radius: 4px;
      transition: background 0.2s;
    }
    nav a:hover { background: #3d5166; color: #fff; }

    .container {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 20px;
    }

    h1 { font-size: 22px; margin-bottom: 20px; color: #2c3e50; }
    h2 { font-size: 17px; margin-bottom: 14px; color: #2c3e50; }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid #e0e0e0;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
    }
    .stat .label { font-size: 13px; color: #888; margin-bottom: 6px; }
    .stat .value { font-size: 26px; font-weight: bold; color: #2c3e50; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th {
      background: #2c3e50;
      color: #fff;
      padding: 10px 14px;
      text-align: left;
      font-weight: 500;
    }
    td { padding: 10px 14px; border-bottom: 1px solid #eee; }
    tr:hover td { background: #f9f9f9; }

    .btn {
      display: inline-block;
      padding: 9px 20px;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #2c3e50; color: #fff; }
    .btn-danger  { background: #e74c3c; color: #fff; }
    .btn-secondary { background: #eee; color: #333; }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 5px;
      color: #555;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #2c3e50;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .alert-error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-blue   { background: #dbeafe; color: #1e40af; }
    .badge-orange { background: #fde8cc; color: #92400e; }
    .badge-green  { background: #d1fae5; color: #065f46; }
    .badge-red    { background: #fee2e2; color: #991b1b; }
    .badge-purple { background: #ede9fe; color: #5b21b6; }
  </style>
</head>
<body>

<nav>
  <a class="brand" href="/">💰 Expense Tracker</a>
  <a href="/">Dashboard</a>
  <a href="/add">Add Expense</a>
  <a href="/expenses">All Expenses</a>
  <a href="/filter">Filter by Month</a>
  <a href="/delete">Delete</a>
</nav>

<div class="container">

  <!-- Flash messages show here on every page -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <!-- Each page fills this block -->
  {% block content %}{% endblock %}

</div>
</body>
</html>
